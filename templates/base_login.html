<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

    <meta charset="UTF-8">
    <title>{% block title %}FlashPoint{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo-login.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="position-absolute top-0 end-0 p-3" style="z-index: 1050;">
        <form method="POST" action="{{ url_for('set_language') }}" class="d-flex align-items-center gap-2">
            <input type="hidden" name="next" value="{{ request.path }}">
            <label class="small text-white mb-0" for="language-select-login">{{ t('language.label') }}</label>
            <select id="language-select-login" name="lang" class="form-select form-select-sm" onchange="this.form.submit()">
                {% for lang in language_options %}
                    <option value="{{ lang.code }}" {% if lang.code == current_lang %}selected{% endif %}>{{ lang.label }}</option>
                {% endfor %}
            </select>
        </form>
    </div>

    {% block content %}{% endblock %}
    <!-- Bootstrap 5 JS Bundle (Popper + JS) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
